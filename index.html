<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you 💕</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="page page-ask">
  <div class="floating-hearts" aria-hidden="true"></div>

  <main class="card">
    <div class="emoji-big">🥺</div>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">Pretty please, my love? 💖</p>

    <div class="btn-row">
      <a href="pick-date.html" class="btn btn-yes" id="yesBtn">Yes! 💍</a>
      <button class="btn btn-no" id="noBtn" type="button">No</button>
    </div>

    <p class="hint" id="hint"></p>
  </main>

  <script src="script.js"></script>
  <script>
    // The "No" button playfully runs away and shrinks the more you chase it.
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const hint = document.getElementById('hint');

    const teases = [
      "Are you sure? 🙈",
      "Really sure? 😢",
      "Think again... 💔",
      "You're breaking my heart!",
      "Last chance to say yes 🥹",
      "The button is shy now!",
      "Catch me if you can 🏃‍♀️",
      "Just say yes already 😘",
    ];
    // === No-button: always visible, never selectable (v3) ===
    let tries = 0;

    // Pop the button out of normal flow so it can be moved freely,
    // starting from exactly where it currently sits.
    function detach() {
      if (noBtn.style.position === 'fixed') return;
      const r = noBtn.getBoundingClientRect();
      noBtn.style.position = 'fixed';
      noBtn.style.margin = '0';
      noBtn.style.zIndex = '5';
      noBtn.style.left = r.left + 'px';
      noBtn.style.top = r.top + 'px';
    }

    // Hop the No button a short distance directly AWAY from the cursor.
    // It stays near the middle of the screen, always full-size and visible —
    // it just can never be where the cursor is. Never shrinks, never hides.
    function flee(fromX, fromY) {
      detach();

      tries++;
      hint.textContent = teases[Math.min(tries - 1, teases.length - 1)];

      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const r = noBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;

      // Direction pointing from the cursor to the button = the escape vector.
      let dx = cx - fromX;
      let dy = cy - fromY;
      let len = Math.hypot(dx, dy) || 1;
      dx /= len;
      dy /= len;

      // Hop ~180px that way (with a little randomness so it feels alive).
      const hop = 170 + Math.random() * 60;
      let x = r.left + dx * hop + (Math.random() - 0.5) * 40;
      let y = r.top + dy * hop + (Math.random() - 0.5) * 40;

      // Keep it comfortably inside the window, away from the very edges so
      // it never looks like it vanished into a corner.
      const margin = 24;
      const maxX = window.innerWidth - w - margin;
      const maxY = window.innerHeight - h - margin;

      // If a hop would push it off an edge, bounce it back toward center.
      if (x < margin || x > maxX) x = window.innerWidth / 2 - w / 2 + (Math.random() - 0.5) * 200;
      if (y < margin || y > maxY) y = window.innerHeight / 2 - h / 2 + (Math.random() - 0.5) * 200;

      x = Math.min(Math.max(x, margin), maxX);
      y = Math.min(Math.max(y, margin), maxY);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    // Proximity guard: the instant the cursor gets near, it hops away —
    // so it can never be hovered or clicked. Runs every time, forever.
    document.addEventListener('mousemove', function (e) {
      const r = noBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 110) flee(e.clientX, e.clientY);
    });

    // Hard fallbacks for touch screens / any stray click.
    noBtn.addEventListener('mouseover', function (e) { flee(e.clientX, e.clientY); });
    noBtn.addEventListener('click', function (e) {
      e.preventDefault();
      flee(e.clientX, e.clientY);
    });
    noBtn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      const t = e.touches[0] || {};
      flee(t.clientX || window.innerWidth / 2, t.clientY || window.innerHeight / 2);
    }, { passive: false });
  </script>
</body>
</html>
