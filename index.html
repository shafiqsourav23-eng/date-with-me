<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you 💕</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="page page-ask">
  <div class="floating-hearts" aria-hidden="true"></div>

  <main class="card">
    <div class="emoji-big">🥺</div>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">Pretty please, my love? 💖</p>

    <div class="btn-row">
      <a href="pick-date.html" class="btn btn-yes" id="yesBtn">Yes! 💍</a>
      <button class="btn btn-no" id="noBtn" type="button">No</button>
    </div>

    <p class="hint" id="hint"></p>
  </main>

  <script src="script.js"></script>
  <script>
    // The "No" button playfully runs away and shrinks the more you chase it.
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const hint = document.getElementById('hint');

    const teases = [
      "Are you sure? 🙈",
      "Really sure? 😢",
      "Think again... 💔",
      "You're breaking my heart!",
      "Last chance to say yes 🥹",
      "The button is shy now!",
      "Catch me if you can 🏃‍♀️",
      "Just say yes already 😘",
    ];
    let tries = 0;

    // Pop the button out of normal flow so it can be moved freely,
    // starting from wherever it currently sits.
    function detach() {
      if (noBtn.style.position === 'fixed') return;
      const r = noBtn.getBoundingClientRect();
      noBtn.style.position = 'fixed';
      noBtn.style.margin = '0';
      noBtn.style.left = r.left + 'px';
      noBtn.style.top = r.top + 'px';
    }

    // Move the No button as far as possible AWAY from a given point,
    // keeping it fully on-screen and always clickable-looking (no shrinking).
    function flee(fromX, fromY) {
      detach();

      tries++;
      hint.textContent = teases[Math.min(tries - 1, teases.length - 1)];

      // Yes grows a little to stay irresistible (capped so it never covers No).
      const scale = Math.min(1 + tries * 0.06, 1.6);
      yesBtn.style.transform = `scale(${scale})`;

      const pad = 16;
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const maxX = Math.max(window.innerWidth - w - pad, pad);
      const maxY = Math.max(window.innerHeight - h - pad, pad);

      // Aim for the opposite side of the screen from the cursor, with a
      // random jump so it's unpredictable. Always lands somewhere reachable.
      let x = fromX < window.innerWidth / 2
        ? window.innerWidth - w - pad - Math.random() * 80
        : pad + Math.random() * 80;
      let y = fromY < window.innerHeight / 2
        ? window.innerHeight - h - pad - Math.random() * 80
        : pad + Math.random() * 80;

      x = Math.min(Math.max(x, pad), maxX);
      y = Math.min(Math.max(y, pad), maxY);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    // Proximity guard: the instant the cursor gets near the button, it bolts —
    // so it can never actually be hovered or clicked. Runs every time, forever.
    document.addEventListener('mousemove', function (e) {
      const r = noBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 90) flee(e.clientX, e.clientY);
    });

    // Hard fallbacks in case a click/tap ever lands on it.
    noBtn.addEventListener('mouseover', function (e) { flee(e.clientX, e.clientY); });
    noBtn.addEventListener('click', function (e) {
      e.preventDefault();
      flee(e.clientX, e.clientY);
    });
    noBtn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      const t = e.touches[0] || {};
      flee(t.clientX || window.innerWidth / 2, t.clientY || window.innerHeight / 2);
    }, { passive: false });
  </script>
</body>
</html>
