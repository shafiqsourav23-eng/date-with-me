<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you 💕</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="page page-ask">
  <div class="floating-hearts" aria-hidden="true"></div>

  <main class="card">
    <div class="emoji-big">🥺</div>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">Pretty please, my love? 💖</p>

    <div class="btn-row">
      <a href="pick-date.html" class="btn btn-yes" id="yesBtn">Yes! 💍</a>
      <button class="btn btn-no" id="noBtn" type="button">No</button>
    </div>

    <p class="hint" id="hint"></p>
  </main>

  <script src="script.js"></script>
  <script>
    // The "No" button playfully runs away and shrinks the more you chase it.
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const hint = document.getElementById('hint');

    const teases = [
      "Are you sure? 🙈",
      "Really sure? 😢",
      "Think again... 💔",
      "You're breaking my heart!",
      "Last chance to say yes 🥹",
      "The button is shy now!",
      "Catch me if you can 🏃‍♀️",
      "Just say yes already 😘",
    ];
    let tries = 0;

    function dodge() {
      tries++;
      hint.textContent = teases[Math.min(tries - 1, teases.length - 1)];

      // Grow the Yes button to make it irresistible.
      const scale = Math.min(1 + tries * 0.18, 2.6);
      yesBtn.style.transform = `scale(${scale})`;

      // Shrink the No button.
      const noScale = Math.max(1 - tries * 0.08, 0.4);
      noBtn.style.transform = `scale(${noScale})`;

      // Move the No button to a random spot.
      const padding = 40;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding;
      const x = Math.random() * Math.max(maxX, 0);
      const y = Math.random() * Math.max(maxY, 0);
      noBtn.style.position = 'fixed';
      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    noBtn.addEventListener('mouseover', dodge);
    noBtn.addEventListener('click', dodge);
    noBtn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      dodge();
    }, { passive: false });
  </script>
</body>
</html>
