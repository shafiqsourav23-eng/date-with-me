<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A little question for you 💕</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="page page-ask">
  <div class="floating-hearts" aria-hidden="true"></div>

  <main class="card">
    <div class="emoji-big">🥺</div>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">Pretty please, my love? 💖</p>

    <div class="btn-row">
      <a href="pick-date.html" class="btn btn-yes" id="yesBtn">Yes! 💍</a>
      <button class="btn btn-no" id="noBtn" type="button">No</button>
    </div>

    <p class="hint" id="hint"></p>
  </main>

  <script src="script.js"></script>
  <script>
    // The "No" button playfully runs away and shrinks the more you chase it.
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const hint = document.getElementById('hint');

    const teases = [
      "Are you sure? 🙈",
      "Really sure? 😢",
      "Think again... 💔",
      "You're breaking my heart!",
      "Last chance to say yes 🥹",
      "The button is shy now!",
      "Catch me if you can 🏃‍♀️",
      "Just say yes already 😘",
    ];
    // === No-button: dodges ONLY inside the card, so it can never vanish (v4) ===
    const card = document.querySelector('.card');
    let tries = 0;
    let detached = false;

    // Pop the button out of normal flow and position it ABSOLUTELY inside the
    // card. Because it lives inside the card, it can never leave the visible
    // box — it always stays right here next to Yes.
    function detach() {
      if (detached) return;
      const cardRect = card.getBoundingClientRect();
      const r = noBtn.getBoundingClientRect();
      noBtn.style.position = 'absolute';
      noBtn.style.margin = '0';
      noBtn.style.zIndex = '5';
      noBtn.style.left = (r.left - cardRect.left) + 'px';
      noBtn.style.top = (r.top - cardRect.top) + 'px';
      detached = true;
    }

    // Jump the No button to the corner of the card furthest from the cursor.
    // Stays fully inside the card at all times — same size, always visible.
    function flee(fromX, fromY) {
      detach();

      tries++;
      hint.textContent = teases[Math.min(tries - 1, teases.length - 1)];

      const cardRect = card.getBoundingClientRect();
      const w = noBtn.offsetWidth;
      const h = noBtn.offsetHeight;
      const maxX = Math.max(cardRect.width - w, 0);
      const maxY = Math.max(cardRect.height - h, 0);

      // Cursor position relative to the card.
      const curX = fromX - cardRect.left;
      const curY = fromY - cardRect.top;

      // Go to the opposite side of the card from the cursor...
      let x = curX < cardRect.width / 2 ? maxX : 0;
      let y = curY < cardRect.height / 2 ? maxY : 0;

      // ...with a little randomness, but always clamped inside the card.
      x += (Math.random() - 0.5) * maxX * 0.5;
      y += (Math.random() - 0.5) * maxY * 0.5;
      x = Math.min(Math.max(x, 0), maxX);
      y = Math.min(Math.max(y, 0), maxY);

      noBtn.style.left = x + 'px';
      noBtn.style.top = y + 'px';
    }

    // Proximity guard: the instant the cursor gets near, it jumps away —
    // so it can never be hovered or clicked. Runs every time, forever.
    document.addEventListener('mousemove', function (e) {
      const r = noBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dist = Math.hypot(e.clientX - cx, e.clientY - cy);
      if (dist < 100) flee(e.clientX, e.clientY);
    });

    // Hard fallbacks for touch screens / any stray click — clicking No can
    // NEVER navigate anywhere; it just dodges and teases.
    noBtn.addEventListener('mouseover', function (e) { flee(e.clientX, e.clientY); });
    noBtn.addEventListener('click', function (e) {
      e.preventDefault();
      flee(e.clientX, e.clientY);
    });
    noBtn.addEventListener('touchstart', function (e) {
      e.preventDefault();
      const t = e.touches[0] || {};
      const cardRect = card.getBoundingClientRect();
      flee(t.clientX || cardRect.left + cardRect.width / 2,
           t.clientY || cardRect.top + cardRect.height / 2);
    }, { passive: false });

    // Keep the button inside the card if the window is resized.
    window.addEventListener('resize', function () {
      if (detached) flee(-9999, -9999);
    });
  </script>
</body>
</html>
